# Subtask 标注产线默认配置
# 关键参数见 doc/pipeline_improvement_plan.md，按数据集特性调整。

stage0:
  jitter_window: 10
  jitter_max_switches: 2
  min_hold_frames: 5
  gripper_reliable_threshold: 0.7
  gripper_jitter_weight: 0.6        # quality_score 抖动项权重 (过激进可调小)
  gripper_invalid_weight: 0.7       # quality_score 无效切换项权重
  length_mad_factor: 3.0
  brightness_threshold: 30.0
  blur_threshold: 100.0
  frozen_diff_threshold: 1.0
  image_sample_count: 5
  gripper_binarize_threshold: 0.5

stage05:
  enable: true                      # 全局视频理解 (替代旧首帧锚点)
  sample_count: 10                  # 均匀采样覆盖全程的帧数
  max_objects: 4

stage1b:
  binarize_threshold: 0.5
  median_filter_window: 7
  min_segment_frames: 10
  lift_threshold: 0.05              # 垂直位移阈值, 区分 pick_up vs grasp
  transport_disp_threshold: 0.08   # 水平位移阈值, 区分 transport vs hold
  use_rdp_for_nonprehensile: true  # 非抓持轨迹启用 RDP 拐点分割
  rdp_epsilon: 0.02                # RDP 简化精度 (按动作尺度调)
  nonprehensile_open_ratio_threshold: 0.1
  speed_minima_window: 5

stage1c:
  keyframes_per_segment: 4
  max_desc_words: 15

stage2:
  min_segment_frames: 10
  max_segment_frames: 400

stage4:
  enable_grounding: false
  box_confidence_threshold: 0.3
  use_sam_refine: true

llm:
  backend: mock               # mock | vllm | openai | gemini
  # --- vLLM 后端 (部署 Qwen-VL 等): 只需填 host, 其余可自动探测 ---
  host: null                  # vLLM 服务 IP, 如 10.0.0.5
  port: 8000                  # vLLM 端口
  model: null                 # served model 名; null -> 调 /v1/models 自动发现
  # --- OpenAI 兼容后端 ---
  llm_model: gpt-4o-mini
  vlm_model: qwen2.5-vl-7b-instruct
  api_key: null               # vLLM 无需鉴权时留空 (内部用 EMPTY)
  base_url: null              # 显式 OpenAI 兼容端点 (优先于 host/port)
  temperature: 0.0
  max_tokens: 1024
  max_retries: 2

loss_weights:
  Gold: 1.0
  Bronze: 0.3
  Flagged: 0.0

enable_text_decomposition: true   # false -> bootstrap: 跳过 VLM 填槽, 用模板生成文本
