# 数据集 profile 模板: DROID (LeRobot)
# 所有标 "需确认" 的字段需对照实际 LeRobot meta/info 填写后再使用。
# 用法: python -m subtask_pipeline.cli run --config configs/datasets/droid.yaml

dataset:
  type: lerobot
  root: /path/to/droid                 # 需确认: 实际路径
  state_key: observation.state
  eef_xyz_dims: [0, 1, 2]             # 需确认: 末端 xyz 在 state 中的下标
  gripper_key: action                  # 需确认: gripper 来源列
  gripper_dim: -1                      # 需确认: gripper 在该列向量中的下标
  gripper_open_is_high: true           # 需确认: 极性
  # gripper_min / gripper_max:         # 需确认: 非 [0,1] 量纲时填上下界
  image_camera: null                   # 需确认: 相机名 (null=自动探测)

stage1b:
  rdp_epsilon: 0.02                    # 需确认: 按 DROID 动作尺度调
  transport_disp_threshold: 0.08

stage2:
  min_segment_frames: 10
  max_segment_frames: 400

llm:
  backend: mock
